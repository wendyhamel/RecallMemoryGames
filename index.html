<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall — Memory Games</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/brand/recall-favicon.svg">
  <link rel="alternate icon" type="image/png" sizes="32x32" href="assets/images/brand/recall-favicon-32.png">
  <link rel="alternate icon" type="image/png" sizes="16x16" href="assets/images/brand/recall-favicon-16.png">
  <link rel="apple-touch-icon" href="assets/images/brand/recall-apple-touch-icon.png">
  <link rel="stylesheet" href="assets/css/production.css">

  <!-- Alpine Plugins -->
	<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>

	<script defer src="assets/js/spot-diff.js"></script>
	<script defer src="assets/js/app.js"></script>

	<!-- Alpine Core -->
  <script defer src="assets/js/alpine.js"></script>
</head>
<body
	x-data="app()"
	x-cloak
	class="font-barlow text-white min-h-screen flex flex-col items-center gap-8 px-5 py-7 !overflow-auto"
>

<!-- Header -->
<header class="flex flex-wrap w-full max-w-4xl justify-between items-center gap-4">
	<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 120" width="260" role="img" aria-label="Recall — Memory Games">
		<defs>
			<linearGradient id="wmg" x1="0" y1="0" x2="1" y2="0">
				<stop offset="0" stop-color="hsl(230,85%,63%)"/>
				<stop offset="1" stop-color="hsl(261,73%,60%)"/>
			</linearGradient>
			<linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
				<stop offset="0" stop-color="hsl(230,90%,72%)"/>
				<stop offset="1" stop-color="hsl(258,85%,74%)"/>
			</linearGradient>
		</defs>
		<g transform="translate(8 8) scale(1.04)">
			<g>
				<circle cx="50" cy="52" r="22" fill="none" stroke="url(#mk)" stroke-width="3" opacity="0.61"/>
				<circle cx="50" cy="52" r="34" fill="none" stroke="url(#mk)" stroke-width="3" opacity="0.38"/>
				<circle cx="50" cy="52" r="46" fill="none" stroke="url(#mk)" stroke-width="3" opacity="0.21"/>
			</g>
			<g stroke="hsl(232,52%,74%)" stroke-width="2.3" stroke-linecap="round" opacity="0.55">
				<line x1="50" y1="52" x2="22.5" y2="32"/>
				<line x1="50" y1="52" x2="73" y2="38"/>
				<line x1="50" y1="52" x2="68.9" y2="83.05"/>
				<line x1="50" y1="52" x2="32" y2="66.4"/>
			</g>
			<g>
				<circle cx="22.5" cy="32" r="5.5" fill="hsl(232,60%,80%)"/>
				<circle cx="73" cy="38" r="6" fill="hsl(189,62%,60%)"/>
				<circle cx="68.9" cy="83.05" r="5" fill="hsl(232,60%,80%)"/>
				<circle cx="32" cy="66.4" r="4" fill="hsl(232,60%,80%)"/>
			</g>
			<circle cx="50" cy="52" r="9.5" fill="url(#mk)"/>
		</g>
		<text x="150" y="60" font-family="Barlow, sans-serif" font-weight="800" font-size="62" letter-spacing="-1" fill="#ffffff" dominant-baseline="middle">Recall</text>
		<text x="153" y="92" font-family="Barlow, sans-serif" font-weight="700" font-size="15" letter-spacing="4" fill="rgba(255,255,255,0.55)">MEMORY GAMES</text>
	</svg>

	<!-- Full navigation -->
	<nav class="flex items-center gap-2 flex-wrap justify-center">
		<button type="button" @click="page = 'dashboard'"
		        :class="page === 'dashboard' ? 'bg-gradient-to-r from-blue to-purple border-white/25' : 'bg-white/5 border-white/10 hover:border-white/25'"
		        class="flex items-center gap-2 border rounded-2.5xl px-4 py-2 text-white cursor-pointer transition-colors font-barlow text-xs font-bold tracking-px uppercase">
			Dashboard
		</button>
		<button type="button" @click="page = 'scores'"
		        :class="page === 'scores' ? 'bg-gradient-to-r from-blue to-purple border-white/25' : 'bg-white/5 border-white/10 hover:border-white/25'"
		        class="flex items-center gap-2 border rounded-2.5xl px-4 py-2 text-white cursor-pointer transition-colors font-barlow text-xs font-bold tracking-px uppercase">
			Scores
		</button>
		<div class="relative" x-data="{ open: false }" @click.outside="open = false" @keydown.escape="open = false">
			<button @click="open = !open" type="button" :aria-expanded="open"
			        :class="['sequence', 'match', 'difference', 'tray'].includes(page) ? 'bg-gradient-to-r from-blue to-purple border-white/25' : 'bg-white/5 border-white/10 hover:border-white/25'"
			        class="flex items-center gap-2 border rounded-2.5xl px-4 py-2 cursor-pointer transition-colors text-white">
				<span class="font-barlow text-xs font-bold tracking-px uppercase" x-text="page === 'sequence' ? 'Sequence' : page === 'match' ? 'Match' : page === 'difference' ? 'Difference' : page === 'tray' ? 'Tray' : 'Games'"></span>
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
				     class="size-3 transition-transform" :class="open && 'rotate-180'">
					<path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
				</svg>
			</button>
			<ul x-show="open" x-cloak x-transition.opacity.duration.150ms
			    class="absolute left-1/2 top-full -translate-x-1/2 mt-2 min-w-44 bg-white/5 border border-white/10 rounded-2xl backdrop-blur-sm overflow-hidden z-20 py-1 sm:left-auto sm:right-0 sm:translate-x-0">
				<li>
					<button type="button" @click="page = 'sequence'; open = false"
					        :class="page === 'sequence' ? 'bg-white/10' : 'hover:bg-white/[0.08]'"
					        class="w-full flex items-center gap-3 px-4 py-2.5 text-left text-white cursor-pointer transition-colors font-barlow text-xs font-bold tracking-px uppercase">
						<img src="assets/images/game_icons/sequence.svg" width="24" height="24" alt="">
						Sequence
					</button>
				</li>
				<li>
					<button type="button" @click="page = 'match'; open = false"
					        :class="page === 'match' ? 'bg-white/10' : 'hover:bg-white/[0.08]'"
					        class="w-full flex items-center gap-3 px-4 py-2.5 text-left text-white cursor-pointer transition-colors font-barlow text-xs font-bold tracking-px uppercase">
						<img src="assets/images/game_icons/match.svg" width="24" height="24" alt="">
						Match
					</button>
				</li>
				<li>
					<button type="button" @click="page = 'difference'; open = false"
					        :class="page === 'difference' ? 'bg-white/10' : 'hover:bg-white/[0.08]'"
					        class="w-full flex items-center gap-3 px-4 py-2.5 text-left text-white cursor-pointer transition-colors font-barlow text-xs font-bold tracking-px uppercase">
						<img src="assets/images/game_icons/difference.svg" width="24" height="24" alt="">
						Difference
					</button>
				</li>
				<li>
					<button type="button" @click="page = 'tray'; open = false"
					        :class="page === 'tray' ? 'bg-white/10' : 'hover:bg-white/[0.08]'"
					        class="w-full flex items-center gap-3 px-4 py-2.5 text-left text-white cursor-pointer transition-colors font-barlow text-xs font-bold tracking-px uppercase">
						<img src="assets/images/game_icons/tray.svg" width="24" height="24" alt="">
						Tray
					</button>
				</li>
			</ul>
		</div>
	</nav>
</header>

<main class="w-full max-w-4xl flex-1 flex flex-col items-center">

<!-- Dashboard -->
<section x-show="page === 'dashboard'" x-cloak x-data="dashboard()" class="w-full flex flex-col items-center gap-6 pb-8">
	<div class="grid md:grid-cols-2 gap-6 w-full">

		<button type="button" @click="page = 'sequence'"
		        class="@container relative bg-white/5 border border-white/10 rounded-2.5xl text-white transition-all duration-200 hover:bg-white/[0.09] hover:border-white/[0.22] hover:scale-105 active:scale-95 cursor-pointer">
			<div
				x-show="sequenceBest > 0"
				x-cloak
				class="flex flex-wrap items-end gap-1 pl-3 pt-3"
			>
				<div class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Best</span>
					<span class="text-sm font-black tabular-nums" x-text="sequenceBest"></span>
				</div>
			</div>
			<div
					class="grid grid-cols-1 items-center text-center gap-2.5 pt-12 px-5 pb-7 @sm:grid-cols-2 @sm:items-center @sm:text-left @sm:justify-between @sm:gap-5 @sm:py-6 @sm:px-6"
					:class="sequenceBest > 0 ? 'pt-12' : 'pt-16'"
			>
				<div class="flex flex-col items-center gap-2.5 @sm:shrink-0">
					<img src="assets/images/game_icons/sequence.svg" class="size-16 @sm:size-20" alt="">
					<div class="font-barlow text-sm font-black tracking-medium uppercase">Sequence</div>
				</div>
				<div class="text-[13px] text-gray font-semibold leading-snug @sm:max-w-xs">Repeat the growing sequence of lights</div>
			</div>
		</button>

		<button type="button" @click="page = 'match'"
		        class="@container relative bg-white/5 border border-white/10 rounded-2.5xl text-white transition-all duration-200 hover:bg-white/[0.09] hover:border-white/[0.22] hover:scale-105 active:scale-95 cursor-pointer">
			<div
				x-show="matchTimerBest > 0 || matchFastestBest > 0 || matchStreakBest > 0"
				x-cloak
				class="flex flex-wrap items-end gap-1 pl-3 pt-3"
			>
				<div x-show="matchTimerBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Timer</span>
					<span class="text-sm font-black tabular-nums" x-text="matchTimerBest"></span>
				</div>
				<div x-show="matchFastestBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Fastest</span>
					<span class="text-sm font-black tabular-nums" x-text="matchFastestBestLabel"></span>
				</div>
				<div x-show="matchStreakBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Streak</span>
					<span class="text-sm font-black tabular-nums" x-text="matchStreakBest"></span>
				</div>
			</div>
			<div
					class="grid grid-cols-1 items-center text-center gap-2.5 pt-12 px-5 pb-7 @sm:grid-cols-2 @sm:items-center @sm:text-left @sm:justify-between @sm:gap-5 @sm:py-6 @sm:px-6"
					:class="matchTimerBest > 0 || matchTimerBest > 0 || matchTimerBest > 0 ? 'pt-12' : 'pt-16'"
			>
				<div class="flex flex-col items-center gap-2.5 @sm:shrink-0">
					<img src="assets/images/game_icons/match.svg" class="size-16 @sm:size-20" alt="">
					<div class="font-barlow text-sm font-black tracking-medium uppercase">Match</div>
				</div>
				<div class="text-[13px] text-gray font-semibold leading-snug @sm:max-w-xs">Flip cards to find the matching pairs</div>
			</div>
		</button>

		<button type="button" @click="page = 'difference'"
		        class="@container relative bg-white/5 border border-white/10 rounded-2.5xl text-white transition-all duration-200 hover:bg-white/[0.09] hover:border-white/[0.22] hover:scale-105 active:scale-95 cursor-pointer">
			<div
				x-show="differenceLevelsBest > 0 || differenceTimerBest > 0 || differenceFastestBest > 0"
				x-cloak
				class="flex flex-wrap items-end gap-1 pl-3 pt-3"
			>
				<div x-show="differenceLevelsBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Levels</span>
					<span class="text-sm font-black tabular-nums" x-text="differenceLevelsBest"></span>
				</div>
				<div x-show="differenceTimerBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Timer</span>
					<span class="text-sm font-black tabular-nums" x-text="differenceTimerBest"></span>
				</div>
				<div x-show="differenceFastestBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Fastest</span>
					<span class="text-sm font-black tabular-nums" x-text="differenceFastestBestLabel"></span>
				</div>
			</div>
			<div
					class="grid grid-cols-1 items-center text-center gap-2.5 pt-12 px-5 pb-7 @sm:grid-cols-2 @sm:items-center @sm:text-left @sm:justify-between @sm:gap-5 @sm:py-6 @sm:px-6"
					:class="differenceLevelsBest > 0 || differenceLevelsBest > 0 || differenceLevelsBest > 0 ? 'pt-12' : 'pt-16'"
			>
				<div class="flex flex-col items-center gap-2.5 @sm:shrink-0">
					<img src="assets/images/game_icons/difference.svg" class="size-16 @sm:size-20" alt="">
					<div class="font-barlow text-sm font-black tracking-medium uppercase">Difference</div>
				</div>
				<div class="text-[13px] text-gray font-semibold leading-snug @sm:max-w-xs">Spot what changed between two images</div>
			</div>
		</button>

		<button type="button" @click="page = 'tray'"
		        class="@container relative bg-white/5 border border-white/10 rounded-2.5xl text-white transition-all duration-200 hover:bg-white/[0.09] hover:border-white/[0.22] hover:scale-105 active:scale-95 cursor-pointer">
			<div
				x-show="trayClassicBest > 0 || trayFastestBest > 0 || trayStreakBest > 0"
				x-cloak
				class="flex flex-wrap items-end gap-1 pl-3 pt-3"
			>
				<div x-show="trayClassicBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Classic</span>
					<span class="text-sm font-black tabular-nums" x-text="trayClassicBest"></span>
				</div>
				<div x-show="trayFastestBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Fastest</span>
					<span class="text-sm font-black tabular-nums" x-text="trayFastestBestLabel"></span>
				</div>
				<div x-show="trayStreakBest > 0" x-cloak class="flex items-center gap-1.5 bg-white/5 border border-white/[0.08] rounded-2xl px-3 py-1">
					<span class="text-[11px] text-gray font-bold tracking-px uppercase">Streak</span>
					<span class="text-sm font-black tabular-nums" x-text="trayStreakBest"></span>
				</div>
			</div>
			<div
					class="grid grid-cols-1 items-center text-center gap-2.5 pt-12 px-5 pb-7 @sm:grid-cols-2 @sm:items-center @sm:text-left @sm:justify-between @sm:gap-5 @sm:py-6 @sm:px-6"
					:class="trayClassicBest > 0 || trayFastestBest > 0 || trayStreakBest > 0 ? 'pt-12' : 'pt-16'"
			>
				<div class="flex flex-col items-center gap-2.5 @sm:shrink-0">
					<img src="assets/images/game_icons/tray.svg" class="size-16 @sm:size-20" alt="">
					<div class="font-barlow text-sm font-black tracking-medium uppercase">Tray</div>
				</div>
				<div class="text-[13px] text-gray font-semibold leading-snug @sm:max-w-xs">Memorize the objects, then recall them</div>
			</div>
		</button>

	</div>
</section>

<!-- Scores -->
<section x-show="page === 'scores'" x-cloak x-data="scoresPage()" class="w-full flex flex-col items-center gap-6 pb-8">
	<div class="font-barlow text-[20px] font-black tracking-large uppercase">Player Scores</div>

	<div class="w-full flex flex-col gap-6">

		<!-- Sequence -->
		<section class="bg-white/5 border border-white/10 rounded-2.5xl p-6 flex flex-col gap-4">
			<div class="flex items-center gap-3">
				<img src="assets/images/game_icons/sequence.svg" width="32" height="32" alt="">
				<div class="font-barlow text-sm font-black tracking-medium uppercase">Sequence</div>
			</div>

			<template x-if="sequenceScores.length === 0">
				<p class="text-[13px] text-gray font-semibold">No games played yet</p>
			</template>

			<div class="flex flex-col gap-2">
				<template x-for="(entry, index) in sequenceScores" :key="entry.date">
					<div class="flex items-center justify-between gap-4 bg-white/5 border border-white/[0.08] rounded-2xl px-4 py-3">
						<div class="flex items-center gap-3">
							<div class="flex items-center justify-center size-7 rounded-full bg-white/10 text-xs font-bold tracking-px" x-text="index + 1"></div>
							<div class="flex flex-col">
								<div class="text-lg font-black tabular-nums leading-none" x-text="entry.score"></div>
								<div class="mt-1 text-[11px] text-gray font-bold tracking-px uppercase" x-text="'Level ' + entry.level"></div>
							</div>
						</div>
						<div class="text-[12px] text-gray font-semibold" x-text="formatDate(entry.date)"></div>
					</div>
				</template>
			</div>
		</section>

		<!-- Match -->
		<section class="bg-white/5 border border-white/10 rounded-2.5xl p-6 flex flex-col gap-5">
			<div class="flex items-center gap-3">
				<img src="assets/images/game_icons/match.svg" width="32" height="32" alt="">
				<div class="font-barlow text-sm font-black tracking-medium uppercase">Match</div>
			</div>

			<div class="flex flex-col gap-2">
				<div class="text-[11px] text-gray font-bold tracking-px uppercase">Against Timer</div>
				<template x-if="matchTimerScores.length === 0">
					<p class="text-[13px] text-gray font-semibold">No games played yet</p>
				</template>
				<div class="flex flex-col gap-2">
					<template x-for="(entry, index) in matchTimerScores" :key="entry.date">
						<div class="flex items-center justify-between gap-4 bg-white/5 border border-white/[0.08] rounded-2xl px-4 py-3">
							<div class="flex items-center gap-3">
								<div class="flex items-center justify-center size-7 rounded-full bg-white/10 text-xs font-bold tracking-px" x-text="index + 1"></div>
								<div class="flex flex-col">
									<div class="text-lg font-black tabular-nums leading-none" x-text="entry.score"></div>
									<div class="mt-1 text-[11px] text-gray font-bold tracking-px uppercase" x-text="entry.cardCount + ' cards'"></div>
								</div>
							</div>
							<div class="text-[12px] text-gray font-semibold" x-text="formatDate(entry.date)"></div>
						</div>
					</template>
				</div>
			</div>

			<div class="flex flex-col gap-2">
				<div class="text-[11px] text-gray font-bold tracking-px uppercase">Fastest Time</div>
				<template x-if="matchFastestScores.length === 0">
					<p class="text-[13px] text-gray font-semibold">No games played yet</p>
				</template>
				<div class="flex flex-col gap-2">
					<template x-for="(entry, index) in matchFastestScores" :key="entry.date">
						<div class="flex items-center justify-between gap-4 bg-white/5 border border-white/[0.08] rounded-2xl px-4 py-3">
							<div class="flex items-center gap-3">
								<div class="flex items-center justify-center size-7 rounded-full bg-white/10 text-xs font-bold tracking-px" x-text="index + 1"></div>
								<div class="flex flex-col">
									<div class="text-lg font-black tabular-nums leading-none" x-text="entry.time.toFixed(1) + 's'"></div>
									<div class="mt-1 text-[11px] text-gray font-bold tracking-px uppercase" x-text="entry.cardCount + ' cards'"></div>
								</div>
							</div>
							<div class="text-[12px] text-gray font-semibold" x-text="formatDate(entry.date)"></div>
						</div>
					</template>
				</div>
			</div>

			<div class="flex flex-col gap-2">
				<div class="text-[11px] text-gray font-bold tracking-px uppercase">Perfect Streak</div>
				<template x-if="matchStreakScores.length === 0">
					<p class="text-[13px] text-gray font-semibold">No games played yet</p>
				</template>
				<div class="flex flex-col gap-2">
					<template x-for="(entry, index) in matchStreakScores" :key="entry.date">
						<div class="flex items-center justify-between gap-4 bg-white/5 border border-white/[0.08] rounded-2xl px-4 py-3">
							<div class="flex items-center gap-3">
								<div class="flex items-center justify-center size-7 rounded-full bg-white/10 text-xs font-bold tracking-px" x-text="index + 1"></div>
								<div class="flex flex-col">
									<div class="text-lg font-black tabular-nums leading-none" x-text="entry.score"></div>
									<div class="mt-1 text-[11px] text-gray font-bold tracking-px uppercase" x-text="'Level ' + entry.level"></div>
								</div>
							</div>
							<div class="text-[12px] text-gray font-semibold" x-text="formatDate(entry.date)"></div>
						</div>
					</template>
				</div>
			</div>
		</section>

		<!-- Difference -->
		<section class="bg-white/5 border border-white/10 rounded-2.5xl p-6 flex flex-col gap-5">
			<div class="flex items-center gap-3">
				<img src="assets/images/game_icons/difference.svg" width="32" height="32" alt="">
				<div class="font-barlow text-sm font-black tracking-medium uppercase">Difference</div>
			</div>

			<div class="flex flex-col gap-2">
				<div class="text-[11px] text-gray font-bold tracking-px uppercase">Levels</div>
				<template x-if="differenceLevelsScores.length === 0">
					<p class="text-[13px] text-gray font-semibold">No games played yet</p>
				</template>
				<div class="flex flex-col gap-2">
					<template x-for="(entry, index) in differenceLevelsScores" :key="entry.date">

				<div x-show="['coverout', 'study', 'coverin'].includes(phase)" x-cloak class="min-w-22 px-5 pt-3 pb-3 text-center bg-white/5 border border-white/[0.08] rounded-2xl backdrop-blur-sm">
					<div class="text-xs font-bold tracking-large uppercase text-gray">Study</div>
					<div class="mt-1.5 text-3xl font-black leading-none tabular-nums" x-text="studyTimeLabel"></div>
				</div>
				<div x-show="mode === 'classic' && phase === 'picking'" x-cloak class="min-w-22 px-5 pt-3 pb-3 text-center bg-white/5 border border-white/[0.08] rounded-2xl backdrop-blur-sm">
					<div class="text-xs font-bold tracking-large uppercase text-gray">Time</div>
					<div class="mt-1.5 text-3xl font-black leading-none tabular-nums" :class="answerTime <= 30 && 'text-red'" x-text="answerTimeLabel"></div>
				</div>
				<div x-show="mode === 'fastest' && phase === 'picking'" x-cloak class="min-w-22 px-5 pt-3 pb-3 text-center bg-white/5 border border-white/[0.08] rounded-2xl backdrop-blur-sm">
					<div class="text-xs font-bold tracking-large uppercase text-gray">Time</div>
					<div class="mt-1.5 text-3xl font-black leading-none tabular-nums" x-text="elapsedLabel"></div>
				</div>
				<div x-show="mode === 'fastest' && phase === 'picking'" x-cloak class="min-w-22 px-5 pt-3 pb-3 text-center bg-white/5 border border-white/[0.08] rounded-2xl backdrop-blur-sm">
					<div class="text-xs font-bold tracking-large uppercase text-gray">Attempts</div>
					<div class="mt-1.5 text-3xl font-black leading-none tabular-nums" x-text="`${attemptsUsed} / ${MAX_ATTEMPTS}`"></div>
				</div>
				<div x-show="mode !== 'fastest'" x-cloak class="min-w-22 px-5 pt-3 pb-3 text-center bg-white/5 border border-white/[0.08] rounded-2xl backdrop-blur-sm">
					<div class="text-xs font-bold tracking-large uppercase text-gray">Score</div>
					<div class="mt-1.5 text-3xl font-black leading-none tabular-nums" x-text="score"></div>
				</div>
				<div class="min-w-22 px-5 pt-3 pb-3 text-center bg-white/5 border border-white/[0.08] rounded-2xl backdrop-blur-sm">
					<div class="text-xs font-bold tracking-large uppercase text-gray">Best</div>
					<div class="mt-1.5 text-3xl font-black leading-none tabular-nums" x-text="statsBest"></div>
				</div>
			</div>

			<!-- Stage progress (streak only) -->
			<div x-show="mode === 'streak'" x-cloak class="flex gap-3 items-center">
				<template x-for="i in STREAK_STAGES_PER_LEVEL" :key="i">
					<div :class="['w-[15px] h-[15px] rounded-full border border-white/[0.14] bg-white/10 transition-all duration-[250ms]', i <= stagesDone ? 'dot-done' : '']"></div>
				</template>
				<span class="ml-2 text-xs text-gray font-bold tracking-medium uppercase" x-text="`Stage ${stage} / ${STREAK_STAGES_PER_LEVEL}`"></span>
			</div>

			<!-- Transition banners -->
			<div x-show="phase === 'stageclear'" x-cloak class="text-[13px] text-cyan font-bold tracking-medium uppercase">Stage clear!</div>
			<div x-show="phase === 'levelup'" x-cloak class="flex flex-col items-center gap-1">
				<div class="text-[13px] text-cyan font-bold tracking-medium uppercase">Level Up!</div>
				<div class="text-[32px] font-black leading-[0.95] tabular-nums" x-text="level"></div>
			</div>

			<!-- Tray stage: cover-out / study / cover-in -->
			<template x-if="['coverout', 'study', 'coverin'].includes(phase)">
				<div class="flex flex-col items-center gap-3">
					<div class="tray-stage">
						<div class="tray-surface">
							<template x-for="obj in trayObjects" :key="obj.id">
								<img :src="colorSrc(obj.id)" class="tray-object"
								     :style="`width:${trayIconPx}px;height:${trayIconPx}px;left:${obj.x}px;top:${obj.y}px;transform:rotate(${obj.rot}deg)`" alt="">
							</template>
						</div>
						<img src="assets/images/tray_objects/tray-cover.svg" class="tray-cover" :class="{ 'is-open': !covered }"
						     @transitionend="onCoverTransitionEnd($event)" alt="">
					</div>
					<div x-show="phase === 'study'" x-cloak class="text-[13px] text-yellow font-bold tracking-medium uppercase" x-text="`Memorize! ${Math.ceil(studyTime)}s`"></div>
					<button type="button" x-show="phase === 'study'" x-cloak @click="skipStudy()"
					        class="bg-white/5 border border-white/10 rounded-2.5xl px-4 py-2 cursor-pointer transition-colors text-gray hover:text-white hover:border-white/25 font-barlow text-xs font-bold tracking-px uppercase">Got it</button>
				</div>
			</template>

			<!-- Picker -->
			<template x-if="['picking', 'stageclear', 'levelup'].includes(phase)">
				<div class="flex flex-col items-center gap-3 w-full">
					<div class="tray-picker w-full max-w-3xl" :style="`--tile-min: ${trayTileMinPx}px`">
						<template x-for="tile in pickerTiles" :key="tile.id">
							<button type="button"
							        @click="mode === 'fastest' ? toggleTile(tile) : (mode === 'streak' ? handleStreakTileClick(tile) : handleTileClick(tile))"
							        class="tray-tile" :class="{ 'is-selected': tile.state === 'selected', 'is-correct': tile.state === 'correct', 'is-wrong': tile.state === 'wrong' }">
								<img :src="tile.state === 'selected' ? colorSrc(tile.id) : silhouetteSrc(tile.id)" alt="">
							</button>
						</template>
					</div>
					<div x-show="mode !== 'fastest'" x-cloak class="text-xs text-gray font-bold tracking-medium uppercase">Found <span x-text="correctFoundCount"></span> / <span x-text="correctIds.size"></span></div>
					<div x-show="mode === 'fastest'" x-cloak class="flex flex-col items-center gap-2">
						<div class="text-xs text-gray font-bold tracking-medium uppercase" x-text="feedback"></div>
						<button type="button" @click="submit()"
						        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer">Submit</button>
					</div>
				</div>
			</template>

			<!-- Classic terminal -->
			<template x-if="phase === 'roundclear'">
				<div class="flex flex-col items-center gap-2 py-8">
					<div class="text-[13px] text-cyan font-bold tracking-medium uppercase">All Found!</div>
					<div class="text-[46px] font-black leading-[0.95] tabular-nums" x-text="score"></div>
					<div class="text-xs text-gray font-semibold tracking-[0.5px]">final score, banked in best</div>
					<button type="button" @click="startGame()"
					        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer mt-2">Play Again</button>
				</div>
			</template>
			<template x-if="phase === 'timeup'">
				<div class="flex flex-col items-center gap-2 py-8">
					<div class="text-[13px] font-bold text-red tracking-medium uppercase">Time's Up</div>
					<div class="text-[46px] font-black leading-[0.95] tabular-nums" x-text="score"></div>
					<div class="text-xs text-gray font-semibold tracking-[0.5px]">final score, banked in best</div>
					<button type="button" @click="startGame()"
					        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer mt-2">Retry</button>
				</div>
			</template>

			<!-- Fastest terminal -->
			<template x-if="phase === 'success'">
				<div class="flex flex-col items-center gap-2 py-8">
					<div class="text-[13px] text-cyan font-bold tracking-medium uppercase">Nailed It!</div>
					<div class="text-[46px] font-black leading-[0.95] tabular-nums" x-text="elapsedLabel"></div>
					<div class="text-xs text-gray font-semibold tracking-[0.5px]">your time, banked if it's a new best</div>
					<button type="button" @click="startGame()"
					        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer mt-2">Play Again</button>
				</div>
			</template>
			<template x-if="phase === 'failed'">
				<div class="flex flex-col items-center gap-2 py-8">
					<div class="text-[13px] font-bold text-red tracking-medium uppercase">Out of Attempts</div>
					<div class="text-xs text-gray font-semibold tracking-[0.5px]">3 attempts used without a perfect answer</div>
					<button type="button" @click="startGame()"
					        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer mt-2">Retry</button>
				</div>
			</template>

			<!-- Streak terminal -->
			<template x-if="phase === 'streakover'">
				<div class="flex flex-col items-center gap-2 py-8">
					<div class="text-[13px] font-bold text-red tracking-medium uppercase">Streak Ended</div>
					<div class="text-[46px] font-black leading-[0.95] tabular-nums" x-text="score"></div>
					<div class="text-xs text-gray font-semibold tracking-[0.5px]">final score, banked in best</div>
					<button type="button" @click="startGame()"
					        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer mt-2">Retry</button>
				</div>
			</template>
			<template x-if="phase === 'complete'">
				<div class="flex flex-col items-center gap-2 py-8">
					<div class="text-[13px] text-cyan font-bold tracking-medium uppercase">All 10 Levels Cleared!</div>
					<div class="text-[46px] font-black leading-[0.95] tabular-nums" x-text="score"></div>
					<div class="text-xs text-gray font-semibold tracking-[0.5px]">final score</div>
					<button type="button" @click="phase = 'setup'"
					        class="start-btn font-barlow text-sm font-black tracking-medium uppercase text-white border-none rounded-[40px] px-5 py-2.5 cursor-pointer mt-2">Play Again</button>
				</div>
			</template>

			<!-- Controls -->
			<div x-show="!['roundclear', 'timeup', 'success', 'failed', 'streakover', 'complete'].includes(phase)" x-cloak class="flex gap-2.5 items-center">
				<button type="button" @click="muted = !muted"
				        class="flex gap-1 items-center bg-white/5 border border-white/10 rounded-2.5xl px-4 py-2 cursor-pointer transition-colors text-gray hover:text-white hover:border-white/25">
					<svg data-slot="icon" fill="none" stroke-width="1.5" stroke="currentColor" viewBox="0 0 24 24"
					     xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="size-4" x-show="!muted" x-cloak>
						<path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z"></path>
					</svg>
					<svg data-slot="icon" fill="none" stroke-width="1.5" stroke="currentColor" viewBox="0 0 24 24"
					     xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="size-4" x-show="muted" x-cloak>
						<path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75 19.5 12m0 0 2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6 4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z"></path>
					</svg>
					<span class="font-barlow text-xs font-bold tracking-px uppercase" x-text="muted ? 'Sound off' : 'Sound on'"></span>
				</button>
				<button type="button" @click="backToSetup()"
				        class="flex items-center gap-1.5 bg-white/5 border border-white/10 rounded-2.5xl px-4 py-2 cursor-pointer transition-colors text-gray hover:text-white hover:border-white/25 font-barlow text-xs font-bold tracking-px uppercase">Change settings</button>
			</div>

		</div>
	</template>

</section>

</main>

</body>
</html>
