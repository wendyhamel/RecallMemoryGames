      <stop offset="16%" stop-color="#dfe2e7"></stop>
      <stop offset="40%" stop-color="#b9bec7"></stop>
      <stop offset="64%" stop-color="#8b909b"></stop>
      <stop offset="86%" stop-color="#565b64"></stop>
      <stop offset="100%" stop-color="#3a3e45"></stop>
