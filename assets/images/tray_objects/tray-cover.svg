  <circle cx="177" cy="177" r="155" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1"></circle>
  <circle cx="177" cy="177" r="156.5" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1"></circle>

  
  <circle cx="177" cy="177" r="25" fill="url(#knobBase)"></circle>
